<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>網路基礎知識測驗</title>
    <style>
        :root {
            --primary-color: #4CAF50;
            --secondary-color: #2196F3;
            --bg-color: #f4f7f6;
            --text-color: #333;
            --card-bg: #fff;
            --correct-color: #d4edda;
            --wrong-color: #f8d7da;
            --explanation-bg: #fff3cd;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .container {
            background-color: var(--card-bg);
            border-radius: 10px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 800px;
            padding: 30px;
        }

        h1, h2 {
            text-align: center;
            color: #2c3e50;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            transition: opacity 0.3s;
            margin: 5px;
        }

        .btn:hover { opacity: 0.8; }
        .btn-primary { background-color: var(--primary-color); color: white; }
        .btn-secondary { background-color: var(--secondary-color); color: white; }
        
        #mode-selection { text-align: center; margin-top: 30px; }
        .hidden { display: none !important; }

        .question-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            font-weight: bold;
            color: #555;
            border-bottom: 2px solid #eee;
            padding-bottom: 10px;
        }

        .question-text {
            font-size: 18px;
            margin-bottom: 20px;
            line-height: 1.5;
            white-space: pre-line; /* 保留題目中的換行符號 */
        }

        .options-list {
            list-style-type: none;
            padding: 0;
        }

        .option-item {
            background-color: #f9f9f9;
            border: 2px solid #eee;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
        }

        .option-item:hover {
            border-color: #bdc3c7;
            background-color: #f1f2f6;
        }

        .option-item.selected {
            border-color: var(--secondary-color);
            background-color: #e3f2fd;
        }

        .option-item.correct {
            background-color: var(--correct-color);
            border-color: #28a745;
        }

        .option-item.wrong {
            background-color: var(--wrong-color);
            border-color: #dc3545;
        }

        .feedback {
            margin-top: 15px;
            padding: 15px;
            border-radius: 5px;
            font-weight: bold;
        }

        /* 解析區塊的樣式 */
        .explanation-box {
            margin-top: 15px;
            padding: 15px;
            background-color: var(--explanation-bg);
            border-left: 5px solid #ffc107;
            border-radius: 4px;
            color: #856404;
            line-height: 1.5;
        }

        .controls {
            display: flex;
            justify-content: space-between;
            margin-top: 20px;
        }

        #results-area .summary-item {
            border-bottom: 1px solid #ccc;
            padding: 15px 0;
        }
    </style>
</head>
<body>

<div class="container">
    <div id="mode-selection">
        <h1>網路基礎知識測驗</h1>
        <p>請選擇您想要的練習模式：</p>
        <button class="btn btn-primary" onclick="startGame('immediate')">即時回饋模式 (作答後馬上看答案與解析)</button>
        <button class="btn btn-secondary" onclick="startGame('deferred')">測驗模式 (全部作答完才看結果與解析)</button>
    </div>

    <div id="quiz-area" class="hidden">
        <div class="question-header">
            <span id="question-counter">問題 1 / 10</span>
            <span id="mode-indicator">模式</span>
        </div>
        <div id="question-text" class="question-text"></div>
        <div id="multi-select-hint" style="color: #e67e22; font-size: 14px; margin-bottom: 10px;" class="hidden">（此為多選題，請選擇正確數量的選項後點擊確認）</div>
        <ul id="options-list" class="options-list"></ul>
        
        <div id="feedback-area" class="feedback hidden"></div>
        <div id="explanation-area" class="explanation-box hidden"></div>

        <div class="controls">
            <button id="confirm-btn" class="btn btn-primary hidden" onclick="checkMultiAnswer()">確認答案</button>
            <button id="next-btn" class="btn btn-secondary hidden" onclick="nextQuestion()">下一題</button>
        </div>
    </div>

    <div id="results-area" class="hidden">
        <h2>測驗結束！</h2>
        <h3 id="final-score"></h3>
        <div id="review-list"></div>
        <button class="btn btn-primary" style="margin-top: 20px;" onclick="location.reload()">重新測驗</button>
    </div>
</div>

<script>
    // 這裡放入題庫 (為您轉換了前 10 題，並加入 explanation 欄位)
    const questions = [
        {
            id: 1,
            text: "請將清單所列的每個通訊協定，與對應的正確 TCP/IP 模型層進行配對。\n〔TCP 模型層〕：A.應用程式 B.傳輸 C.網際網路 D.網路存取\n〔通訊協定〕：1.TCP 2.IP 3.FTP 4.乙太網路",
            type: "single",
            options: [
                "A-3, B-1, C-2, D-4", 
                "A-1, B-2, C-3, D-4", 
                "A-4, B-3, C-2, D-1", 
                "A-2, B-1, C-4, D-3"
            ],
            correctAnswers: [0],
            explanation: "解析：FTP 屬於應用程式層 (A-3)；TCP 屬於傳輸層 (B-1)；IP 屬於網際網路層 (C-2)；乙太網路屬於網路存取層 (D-4)。"
        },
        {
            id: 2,
            text: "在資料封裝程序中，哪個 OSI 層會加入包含 MAC 定址資訊的標頭以及用於錯誤檢查的尾端？",
            type: "single",
            options: ["資料連結", "傳輸", "工作階段", "網路"],
            correctAnswers: [0],
            explanation: "解析：資料連結層 (Data Link Layer) 負責將實體層的位元組裝成框架 (Frame)，並加入來源與目的地的 MAC 位址標頭，以及用於錯誤檢查的 FCS (框架檢查碼) 尾端。"
        },
        {
            id: 3,
            text: "請選出下列情境對應的正確網路類型組合：\nA. 兩部家庭辦公室電腦經由乙太網路纜線連線到交換器。\nB. 同一個城市的三棟政府大樓經由同軸電纜連線到有線電視公司。\nC. 手機連線到藍牙耳機。\nD. 金融機構透過電信服務提供者連接其分支機構。\n(1. WAN  2. PAN  3. MAN  4. LAN)",
            type: "single",
            options: [
                "A-1, B-2, C-3, D-4",
                "A-4, B-3, C-2, D-1",
                "A-3, B-4, C-1, D-2",
                "A-2, B-1, C-4, D-3"
            ],
            correctAnswers: [1],
            explanation: "解析：A 是區域網路 (LAN-4)；B 跨越單一城市是都會網路 (MAN-3)；C 藍牙是個人區域網路 (PAN-2)；D 跨越廣大地理區域連接分支機構是廣域網路 (WAN-1)。"
        },
        {
            id: 4,
            text: "請選出下列情境對應的雲端運算服務模型組合：\nA. 三部虛擬機器由雲端的虛擬網路連接。\nB. 使用者按月付費以存取位於雲端的 Web 架構圖形設計應用程式。\nC. 公司使用雲端架構的資源和工具開發應用程式。\n(1. IaaS  2. PaaS  3. SaaS)",
            type: "single",
            options: [
                "A-1, B-3, C-2",
                "A-2, B-1, C-3",
                "A-3, B-2, C-1",
                "A-1, B-2, C-3"
            ],
            correctAnswers: [0],
            explanation: "解析：A 提供基礎虛擬網路與機器是基礎設施即服務 (IaaS-1)；B 提供終端應用程式是軟體即服務 (SaaS-3)；C 提供開發工具與環境是平台即服務 (PaaS-2)。"
        },
        {
            id: 5,
            text: "請選出下列情境對應的通訊協定組合：\nA. 執行查詢以將 companypro.net 轉譯為 IP 位址。\nB. 將保留的 IP 位址 10.10.10.201 指派給您公司的網頁伺服器。\nC. 執行 ping 以確認伺服器是否回應網路連線。\n(1. DHCP  2. DNS  3. ICMP)",
            type: "single",
            options: [
                "A-1, B-2, C-3",
                "A-3, B-1, C-2",
                "A-2, B-1, C-3",
                "A-2, B-3, C-1"
            ],
            correctAnswers: [2],
            explanation: "解析：A 解析網域名稱是 DNS(2)；B 指派 IP 位址是 DHCP(1)；C Ping 指令使用的是 ICMP(3) 協定。"
        },
        {
            id: 6,
            text: "請問哪種通訊協定可讓您安全地將檔案上傳到網際網路上的另一台電腦？",
            type: "single",
            options: ["SFTP", "ICMP", "NTP", "HTTP"],
            correctAnswers: [0],
            explanation: "解析：SFTP (Secure File Transfer Protocol) 透過 SSH 提供安全的檔案傳輸。HTTP 是網頁傳輸，NTP 是時間同步，ICMP 用於網路診斷。"
        },
        {
            id: 7,
            text: "請問 UDP 片段的標頭中包含哪些資訊？",
            type: "single",
            options: ["連接埠號碼", "IP 位址", "序號", "MAC 位址"],
            correctAnswers: [0],
            explanation: "解析：UDP 標頭非常精簡，僅包含來源連接埠號碼、目的地連接埠號碼、長度以及檢查碼。IP 位址在網路層，MAC 位址在資料連結層，序號是 TCP 特有的。"
        },
        {
            id: 8,
            text: "某個主機被指定了 IP 位址 172.16.100.25 和子網路遮罩 255.255.252.0。請問這個位址的 CIDR 標記法為何？",
            type: "single",
            options: ["172.16.100.25 /22", "172.16.100.25 /21", "172.16.100.25 /20", "172.16.100.25 /23"],
            correctAnswers: [0],
            explanation: "解析：子網路遮罩 255.255.252.0 轉換為二進位是 11111111.11111111.11111100.00000000。總共有 8+8+6 = 22 個 1，因此 CIDR 為 /22。"
        },
        {
            id: 9,
            text: "請問以下哪個位址包含在 192.168.200.0/24 網路中？",
            type: "single",
            options: ["192.168.200.13", "192.168.1.13", "192.168.201.13", "192.168.199.13"],
            correctAnswers: [0],
            explanation: "解析：/24 代表前三個八位元 (192.168.200) 是網路部，最後一個八位元是主機部。因此只有 192.168.200.x 屬於這個網段。"
        },
        {
            id: 10,
            text: "請問 IPv6 位址 2001:0db8:0000:0016:0000:001b:2000:0056 的最大壓縮有效格式為何？",
            type: "single",
            options: [
                "2001: db8:16: :1b:2:56",
                "2001: db8: :16 :: 1b:2:56",
                "2001: db8: :16: :1b: 2000:56",
                "2001: db8:0:16: :1b:2000:56"
            ],
            correctAnswers: [3],
            explanation: "解析：IPv6 壓縮規則：1. 省略前導零 (0db8 -> db8, 0016 -> 16)。 2. 雙冒號 (::) 只能用一次來取代連續的零。此位址有兩段單一的 0000，只能選一處壓縮或單純省略前導零。正確壓縮為 2001:db8:0:16::1b:2000:56 (保留一個0，另一處用::)。"
        },
      {
            id: 11,
            text: "您需要使用 1000BASE-T 纜線將電腦的網路介面卡連接到交換器。 請問您應該使用哪個接頭？",
            type: "single",
            options: ["RJ-45", "RJ-11", "Coax", "OS2 LC"],
            correctAnswers: [0],
            explanation: "解析：1000BASE-T 是 Gigabit 乙太網路標準，使用雙絞線（如 Cat5e/Cat6），對應的標準接頭為 RJ-45。RJ-11 是電話線接頭，Coax 是同軸電纜，LC 則是光纖接頭。"
        },
        {
            id: 12,
            text: "請問以下哪個標準包含 Wi-Fi 網路的規格？",
            type: "single",
            options: ["IEEE 802.11", "EIA/TIA 568A", "LTE", "GSM"],
            correctAnswers: [0],
            explanation: "解析：IEEE 802.11 是無線區域網路 (WLAN) 的標準，也就是我們俗稱的 Wi-Fi。LTE 和 GSM 是行動通訊標準，EIA/TIA 568A 是網路線打線標準。"
        },
        {
            id: 13,
            text: "您想要儲存網路上每個使用者都可以存取的檔案。 請問您需要哪種端點裝置？",
            type: "single",
            options: ["交換器", "伺服器", "集線器", "存取點"],
            correctAnswers: [1],
            explanation: "解析：伺服器 (Server) 負責集中儲存與管理檔案，並提供給網路上的使用者存取（例如檔案伺服器）。交換器、集線器與存取點都屬於網路連線設備，而非儲存端點。"
        },
        {
            id: 14,
            text: "某位使用者起始了障礙申告票證，指出外部網頁未載入。您判斷內部與外部的其他資源仍可存取。 請問您可以使用哪個命令來協助在外部網頁的網路路徑中找出問題所在？",
            type: "single",
            options: ["tracert", "nslookup", "ping -t", "ipconfig/all"],
            correctAnswers: [0],
            explanation: "解析：tracert (Trace Route) 命令可以追蹤封包從來源到目的地所經過的每一個路由器節點（躍點），幫助找出在哪個特定的網路路徑區段發生了中斷或延遲。"
        },
        {
            id: 15,
            text: "某位支援技術人員檢查了 Cisco 交換器的前面板，發現前四個連接埠已連接 4 條乙太網路纜線。連接埠 1、2 和 3 都亮起綠色 LED。連接埠 4 則閃爍綠燈。 請問連接埠 4 的狀態為何？",
            type: "single",
            options: [
                "連結已上線且不穩定。",
                "連結已上線且沒有活動。",
                "連結已上線且使用中。",
                "連結已上線但纜線故障。"
            ],
            correctAnswers: [2],
            explanation: "解析：在多數 Cisco 交換器上，穩定的綠燈代表已建立連線 (Link UP) 但目前無資料傳輸；而「閃爍綠燈」則代表連線不僅已建立，且目前正有網路活動（資料正在傳輸中）。"
        },
        {
            id: 16,
            text: "某位工程師為資料中心團隊設定了一個名為 VLAN2 的新 VLAN。當該團隊嘗試從 VLAN2 中的電腦 Ping VLAN2 外部的位址時，他們無法存取這些位址。 請問工程師應該設定以下何者？",
            type: "single",
            options: ["預設閘道", "靜態路由", "預設路由", "額外的 VLAN"],
            correctAnswers: [0],
            explanation: "解析：不同 VLAN 屬於不同的廣播網域 (子網路)。要讓 VLAN 內的設備與外部網路（其他 VLAN 或網際網路）通訊，必須為電腦設定正確的「預設閘道 (Default Gateway)」。"
        },
        {
            id: 17,
            text: "請問將 IP 位址指派給第 2 層交換器上之管理 VLAN 介面的目的為何？",
            type: "single",
            options: [
                "為了能夠透過 Telnet 或 SSH 存取交換器上的 CLI",
                "為了讓交換器能夠做為所連接裝置的預設閘道",
                "為了讓交換器能夠向網路中的其他交換器提供 DHCP 服務",
                "為了讓交換器能夠解析所連接裝置的 URL"
            ],
            correctAnswers: [0],
            explanation: "解析：第 2 層交換器主要處理 MAC 位址，不需要 IP 也能轉送框架。但為了能從遠端對交換器進行管理（如使用 Telnet、SSH 連接其文字介面 CLI），必須在其管理 VLAN 上設定一組 IP 位址。"
        },
        {
            id: 18,
            text: "某位技術支援中心的技術人員收到下列四個障礙申告票證。請問哪個票證應該獲得最高優先順序並優先處理？",
            type: "single",
            options: [
                "某位使用者要求將印表機搬遷到同一個辦公室中的其他網路插孔。",
                "會議室正在舉行線上網路研討會。視訊會議設備的網際網路存取中斷了。",
                "某位使用者回報某個雲端架構應用程式的回應時間比平常慢。",
                "兩位使用者回報自助餐廳的無線網路存取已經關閉一小時了。"
            ],
            correctAnswers: [1],
            explanation: "解析：IT 支援優先順序通常以「影響業務營運的嚴重程度」來判定。正在進行中的線上會議中斷會直接造成當下的業務停擺與損失，因此屬於最緊急 (最高優先順序) 的事件。"
        },
        {
            id: 19,
            text: "某部 Cisco 交換器無法從網路存取。您需要檢視其運作設定。 請問您可以使用哪種頻外方法存取該交換器？",
            type: "single",
            options: ["主控台", "SSH", "Telnet", "SNMP"],
            correctAnswers: [0],
            explanation: "解析：「頻外 (Out-of-band) 管理」指的是不依賴一般的網路連線通道來進行管理。當設備無法連上網路時，透過實體的主控台纜線 (Console Cable) 直接連接設備，是唯一的頻外存取方法。"
        },
        {
            id: 20,
            text: "應用程式下載資料時發生問題，URL為: https://www.companypro.net:7100/api。您需要使用 Wireshark 擷取封包。\n請問您會使用哪些 Wireshark 篩選選項來完成命令？\n____（A）____ . ____（B）____ == ____（C）____\n（A）1. tcp 2. udp\n（B）1. port 2. user_agent\n（C）1. 7100 2. companypro.net 3. http",
            type: "single",
            options: [
                "1. (A-1, B-1, C-1) -> tcp.port == 7100",
                "2. (A-1, B-2, C-3) -> tcp.user_agent == http",
                "3. (A-2, B-2, C-1) -> udp.user_agent == 7100",
                "4. (A-3, B-2, C-2) -> 格式錯誤"
            ],
            correctAnswers: [0],
            explanation: "解析：HTTPS 使用的是 TCP 協定。要篩選特定通訊埠 (Port 7100) 的流量，Wireshark 的正確語法是 `tcp.port == 7100`。對應題目的選項即為 A(1) - B(1) - C(1)。"
        },
        {
            id: 21,
            text: "請問哪種裝置會根據 IP 位址、連接埠號碼或應用程式允許或拒絕流量來保護網路？",
            type: "single",
            options: ["防火牆", "VPN 閘道", "存取點", "入侵偵測系統"],
            correctAnswers: [0],
            explanation: "解析：防火牆 (Firewall) 是一種存取控制設備，其主要功能就是根據設定的規則（如 IP、連接埠、應用程式等），決定是否允許或拒絕網路流量通過。"
        },

            explanation: "解析：特權 EXEC 模式 (Router#) 主要用於檢視設定、除錯與檔案管理 (`show`, `copy`, `ping`)。若要設定介面或路由協定，必須先進入全域設定模式 (Global Configuration mode, Router(config)#)。"
        },

            type: "single",
            options: [
                "連接埠 Gig0/1 連接到另一部交換器 (或集線器)。",
                "此交換器上有十一個使用中連接埠。",

            ],

            explanation: "解析：通常一台電腦只有一個網路卡 (一個 MAC 位址)。如果一個交換器連接埠上學習到了多個 MAC 位址，代表該連接埠後方串接了另一台包含多部主機的設備（如另一台交換器、Hub 或是虛擬機環境）。"

        {

                "A(O) 正確, B(X) 錯誤, C(O) 正確",
                "A(X) 錯誤, B(X) 錯誤, C(X) 錯誤"
            ],
            correctAnswers: [0],
            explanation: "解析：防火牆可以執行連接埠轉發 (Port Forwarding, A正確) 以及封鎖特定網路埠 (B正確)。但防止應用程式在用戶端的電腦作業系統上「執行」，屬於防毒軟體或端點防護 (EDR) 的功能，而非網路防火牆 (C錯誤)。"
        },
        {

            type: "single",
            options: [
                "A(O) 正確, B(X) 錯誤, C(O) 正確",
                "A(X) 錯誤, B(O) 正確, C(X) 錯誤",
                "A(O) 正確, B(O) 正確, C(X) 錯誤",

            explanation: "解析：頻寬 (Bandwidth) 是實體的傳輸容量上限，不會因為延遲變高而「降低」(水管的粗細不會改變，B錯誤)。但延遲過高會影響 TCP 傳輸效率，因此減少延遲確實能提高實際的「輸送量 (Throughput)」(C正確)。低頻寬造成壅塞時也會增加排隊延遲 (A正確)。"

    let currentMode = '';
    let currentQuestionIndex = 0;
    let score = 0;
    let userAnswers = [];
    let hasAnsweredCurrent = false;

    const modeSelection = document.getElementById('mode-selection');
    const quizArea = document.getElementById('quiz-area');
    const resultsArea = document.getElementById('results-area');
    const questionCounter = document.getElementById('question-counter');
    const modeIndicator = document.getElementById('mode-indicator');
    const questionText = document.getElementById('question-text');
    const optionsList = document.getElementById('options-list');
    const nextBtn = document.getElementById('next-btn');
    const confirmBtn = document.getElementById('confirm-btn');
    const feedbackArea = document.getElementById('feedback-area');
    const explanationArea = document.getElementById('explanation-area');
    const multiSelectHint = document.getElementById('multi-select-hint');

    function startGame(mode) {
        currentMode = mode;
        currentQuestionIndex = 0;
        score = 0;
        userAnswers = [];
        modeSelection.classList.add('hidden');
        quizArea.classList.remove('hidden');
        modeIndicator.innerText = mode === 'immediate' ? '即時回饋模式' : '測驗模式';
        loadQuestion();
    }

    function loadQuestion() {
        hasAnsweredCurrent = false;
        feedbackArea.classList.add('hidden');
        explanationArea.classList.add('hidden');
        nextBtn.classList.add('hidden');
        confirmBtn.classList.add('hidden');
        optionsList.innerHTML = '';
        
        const q = questions[currentQuestionIndex];
        questionCounter.innerText = `問題 ${currentQuestionIndex + 1} / ${questions.length}`;
        questionText.innerText = `${currentQuestionIndex + 1}. ${q.text}`;

        if (q.type === 'multiple') {
            multiSelectHint.classList.remove('hidden');
            if(currentMode === 'immediate') confirmBtn.classList.remove('hidden');
        } else {
            multiSelectHint.classList.add('hidden');
        }

        q.options.forEach((opt, index) => {
            const li = document.createElement('li');
            li.className = 'option-item';
            li.innerText = opt;
            li.onclick = () => selectOption(li, index, q.type);
            optionsList.appendChild(li);
        });

        if (currentMode === 'deferred') {
            confirmBtn.classList.add('hidden');
            nextBtn.classList.remove('hidden');
            nextBtn.disabled = true;
        }
    }

    function selectOption(element, index, type) {
        if (hasAnsweredCurrent && currentMode === 'immediate') return;

        if (type === 'single') {
            Array.from(optionsList.children).forEach(child => child.classList.remove('selected'));
            element.classList.add('selected');
            
            if (currentMode === 'immediate') {
                checkAnswerImmediate([index]);
            } else {
                userAnswers[currentQuestionIndex] = [index];
                nextBtn.disabled = false;
            }
        } else if (type === 'multiple') {
            element.classList.toggle('selected');
            const selectedItems = Array.from(optionsList.children).filter(c => c.classList.contains('selected'));
            
            if (currentMode === 'deferred') {
                userAnswers[currentQuestionIndex] = selectedItems.map(item => Array.from(optionsList.children).indexOf(item));
                nextBtn.disabled = userAnswers[currentQuestionIndex].length === 0;
            }
        }
    }

    function checkMultiAnswer() {
        const selectedIndexes = Array.from(optionsList.children)
            .map((child, index) => child.classList.contains('selected') ? index : -1)
            .filter(index => index !== -1);
            
        const q = questions[currentQuestionIndex];
        if (selectedIndexes.length !== q.requiredCount) {
            alert(`請選擇 ${q.requiredCount} 個答案！`);
            return;
        }
        checkAnswerImmediate(selectedIndexes);
    }

    function checkAnswerImmediate(selectedIndexes) {
        hasAnsweredCurrent = true;
        const q = questions[currentQuestionIndex];
        userAnswers[currentQuestionIndex] = selectedIndexes;
        confirmBtn.classList.add('hidden');

        const isCorrect = selectedIndexes.length === q.correctAnswers.length && 
                          selectedIndexes.every(val => q.correctAnswers.includes(val));
        if (isCorrect) score++;

        Array.from(optionsList.children).forEach((child, index) => {
            if (q.correctAnswers.includes(index)) {
                child.classList.add('correct');
            } else if (selectedIndexes.includes(index)) {
                child.classList.add('wrong');
            }
        });

        feedbackArea.innerText = isCorrect ? "答對了！" : "答錯了！";
        feedbackArea.style.backgroundColor = isCorrect ? "var(--correct-color)" : "var(--wrong-color)";
        feedbackArea.style.color = isCorrect ? "#155724" : "#721c24";
        feedbackArea.classList.remove('hidden');

        // 顯示解析
        if (q.explanation) {
            explanationArea.innerText = q.explanation;
            explanationArea.classList.remove('hidden');
        }
        
        nextBtn.classList.remove('hidden');
        nextBtn.disabled = false;
    }

    function nextQuestion() {
        if (currentMode === 'deferred') {
            const q = questions[currentQuestionIndex];
            const currentAns = userAnswers[currentQuestionIndex] || [];
            const isCorrect = currentAns.length === q.correctAnswers.length && 
                              currentAns.every(val => q.correctAnswers.includes(val));
            if (isCorrect) score++;
        }

        currentQuestionIndex++;
        if (currentQuestionIndex < questions.length) {
            loadQuestion();
        } else {
            showResults();
        }
    }

    function showResults() {
        quizArea.classList.add('hidden');
        resultsArea.classList.remove('hidden');
        document.getElementById('final-score').innerText = `您的總分： ${score} / ${questions.length}`;
        
        const reviewList = document.getElementById('review-list');
        reviewList.innerHTML = '';

        questions.forEach((q, qIndex) => {
            const userAns = userAnswers[qIndex] || [];
            const isCorrect = userAns.length === q.correctAnswers.length && 
                              userAns.every(val => q.correctAnswers.includes(val));
            
            const itemDiv = document.createElement('div');
            itemDiv.className = 'summary-item';
            
            let html = `<h4>第 ${qIndex + 1} 題：\n${q.text}</h4>`;
            html += `<p style="color: ${isCorrect ? 'green' : 'red'}; font-weight: bold;">
                     ${isCorrect ? '【正確】' : '【錯誤】'}</p>`;
            
            html += `<ul>`;
            q.options.forEach((opt, optIndex) => {
                let style = "";
                if (q.correctAnswers.includes(optIndex)) {
                    style = "color: green; font-weight: bold;"; 
                } else if (userAns.includes(optIndex)) {
                    style = "color: red; text-decoration: line-through;"; 
                }
                html += `<li style="${style}">${opt}</li>`;
            });
            html += `</ul>`;

            // 在測驗結果頁面也顯示解析
            if (q.explanation) {
                html += `<div class="explanation-box">${q.explanation}</div>`;
            }
            
            itemDiv.innerHTML = html;
            reviewList.appendChild(itemDiv);
        });
    }
</script>
